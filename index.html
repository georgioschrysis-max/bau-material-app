<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXBAU Polier App</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f2f2f2}
header{background:#d35400;color:white;text-align:center;padding:25px}
.container{padding:20px}
.card,.page{
  background:white;padding:20px;margin-bottom:18px;border-radius:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.15)
}
input,select,textarea{
  width:100%;padding:12px;margin-top:10px;border-radius:8px;
  border:1px solid #ccc;box-sizing:border-box;font-size:16px
}
button{
  width:100%;padding:14px;margin-top:12px;border:none;border-radius:10px;
  background:#e67e22;color:white;font-size:18px;font-weight:bold
}
.back{background:#555}
.delete{background:#c0392b}
.hidden{display:none}
.item{background:#f7f7f7;padding:12px;border-radius:10px;margin-top:10px}
.kostenstelle{color:#d35400;font-weight:bold;font-size:18px}
.phase{border-left:5px solid #e67e22}
.small{font-size:14px;color:#555}
</style>
</head>

<body>

<header>
  <h1>🏗️ MAXBAU Polier App</h1>
  <p>Baustellen · Phasen · Checklisten</p>
</header>

<div class="container">

  <div id="home">
    <div class="card">
      <h2>➕ Neues Bauvorhaben</h2>

      <input id="ks" placeholder="Kostenstelle z.B. 760226">
      <input id="name" placeholder="Name des Bauvorhabens">
      <input id="adresse" placeholder="Adresse">
      <input id="ort" placeholder="Ort / Bereich">
      <select id="typ">
        <option>Mehrfamilienhaus</option>
        <option>Einfamilienhaus</option>
        <option>Rohbau</option>
        <option>Umbau</option>
        <option>Sanierung</option>
        <option>Gewerbebau</option>
      </select>

      <button onclick="addBaustelle()">Bauvorhaben speichern</button>
    </div>

    <div class="card">
      <h2>📋 Meine Baustellen</h2>
      <div id="baustellenListe"></div>
    </div>
  </div>

  <div id="projekt" class="page hidden">
    <h2 id="projektTitel"></h2>
    <div id="projektInfo"></div>

    <h3>🔨 Phasen des Bauvorhabens</h3>
    <div id="phasenListe"></div>

    <button class="back" onclick="showHome()">Zurück</button>
  </div>

  <div id="phasePage" class="page hidden">
    <h2 id="phaseTitel"></h2>
    <p id="phaseProjekt"></p>

    <h3>✅ Checkliste</h3>
    <div id="checkliste"></div>

    <h3>🛠️ Werkzeuge bestellen</h3>
    <input id="werkzeugName" placeholder="Werkzeug">
    <input id="werkzeugMenge" placeholder="Menge">
    <button onclick="addWerkzeug()">Werkzeug zur Bestellung hinzufügen</button>

    <h3>📦 Material bestellen</h3>
    <input id="materialName" placeholder="Material">
    <input id="materialMenge" placeholder="Menge">
    <button onclick="addMaterial()">Material zur Bestellung hinzufügen</button>

    <h3>🛒 Bestellliste dieser Phase</h3>
    <div id="bestellListe"></div>

    <button class="back" onclick="openProjekt(aktuelleBaustelleIndex)">Zurück zum Bauvorhaben</button>
  </div>

</div>

<script>
const standardPhasen = [
  "Baustelleneinrichtung",
  "Erdarbeiten",
  "Fundament / Bodenplatte",
  "Keller / Wände",
  "Decke",
  "Rohbau EG",
  "Rohbau OG",
  "Dach / Abschluss",
  "Kontrolle / Übergabe"
];

const standardChecklist = [
  "Pläne geprüft",
  "Materialbedarf geprüft",
  "Werkzeuge geprüft",
  "Sicherheit kontrolliert",
  "Termin mit Lieferant abgestimmt",
  "Arbeit abgeschlossen"
];

let baustellen = JSON.parse(localStorage.getItem("polierBaustellen")) || [];
let aktuelleBaustelleIndex = null;
let aktuellePhaseIndex = null;

function save(){
  localStorage.setItem("polierBaustellen", JSON.stringify(baustellen));
}

function addBaustelle(){
  if(!ks.value || !name.value || !adresse.value || !ort.value){
    alert("Bitte alle Felder ausfüllen");
    return;
  }

  const phasen = standardPhasen.map(p => ({
    name:p,
    checklist: standardChecklist.map(c => ({text:c, done:false})),
    bestellungen:[]
  }));

  baustellen.push({
    kostenstelle:ks.value,
    name:name.value,
    adresse:adresse.value,
    ort:ort.value,
    typ:typ.value,
    phasen:phasen
  });

  save();
  renderBaustellen();

  ks.value="";
  name.value="";
  adresse.value="";
  ort.value="";
}

function renderBaustellen(){
  baustellenListe.innerHTML = "";

  if(baustellen.length === 0){
    baustellenListe.innerHTML = "<p class='small'>Noch keine Baustelle gespeichert.</p>";
    return;
  }

  baustellen.forEach((b,i)=>{
    baustellenListe.innerHTML += `
      <div class="item">
        <div class="kostenstelle">Kostenstelle: ${b.kostenstelle}</div>
        <strong>${b.name}</strong><br>
        ${b.adresse}<br>
        ${b.ort}<br>
        Typ: ${b.typ}
        <button onclick="openProjekt(${i})">Bauvorhaben öffnen</button>
        <button class="delete" onclick="deleteBaustelle(${i})">Löschen</button>
      </div>
    `;
  });
}

function deleteBaustelle(i){
  if(confirm("Diese Baustelle löschen?")){
    baustellen.splice(i,1);
    save();
    renderBaustellen();
  }
}

function openProjekt(i){
  aktuelleBaustelleIndex = i;
  const b = baustellen[i];

  home.classList.add("hidden");
  phasePage.classList.add("hidden");
  projekt.classList.remove("hidden");

  projektTitel.innerHTML = `🏗️ ${b.name}`;
  projektInfo.innerHTML = `
    <div class="item">
      <div class="kostenstelle">Kostenstelle: ${b.kostenstelle}</div>
      Adresse: ${b.adresse}<br>
      Ort/Bereich: ${b.ort}<br>
      Typ: ${b.typ}
    </div>
  `;

  phasenListe.innerHTML = "";
  b.phasen.forEach((p,index)=>{
    const erledigt = p.checklist.filter(c=>c.done).length;
    phasenListe.innerHTML += `
      <div class="item phase">
        <strong>${index+1}. ${p.name}</strong><br>
        Checkliste: ${erledigt}/${p.checklist.length} erledigt<br>
        Bestellungen: ${p.bestellungen.length}
        <button onclick="openPhase(${index})">Phase öffnen</button>
      </div>
    `;
  });
}

function openPhase(index){
  aktuellePhaseIndex = index;
  const b = baustellen[aktuelleBaustelleIndex];
  const p = b.phasen[index];

  projekt.classList.add("hidden");
  phasePage.classList.remove("hidden");

  phaseTitel.innerHTML = `🔨 ${p.name}`;
  phaseProjekt.innerHTML = `Kostenstelle: ${b.kostenstelle} · ${b.name}`;

  renderCheckliste();
  renderBestellungen();
}

function renderCheckliste(){
  const p = baustellen[aktuelleBaustelleIndex].phasen[aktuellePhaseIndex];
  checkliste.innerHTML = "";

  p.checklist.forEach((c,i)=>{
    checkliste.innerHTML += `
      <label class="item" style="display:block">
        <input type="checkbox" ${c.done ? "checked" : ""} onchange="toggleCheck(${i})">
        ${c.text}
      </label>
    `;
  });
}

function toggleCheck(i){
  const p = baustellen[aktuelleBaustelleIndex].phasen[aktuellePhaseIndex];
  p.checklist[i].done = !p.checklist[i].done;
  save();
  renderCheckliste();
}

function addWerkzeug(){
  addBestellung("Werkzeug", werkzeugName.value, werkzeugMenge.value);
  werkzeugName.value="";
  werkzeugMenge.value="";
}

function addMaterial(){
  addBestellung("Material", materialName.value, materialMenge.value);
  materialName.value="";
  materialMenge.value="";
}

function addBestellung(art, name, menge){
  if(!name || !menge){
    alert("Bitte Name und Menge ausfüllen");
    return;
  }

  const p = baustellen[aktuelleBaustelleIndex].phasen[aktuellePhaseIndex];

  p.bestellungen.push({
    art:art,
    name:name,
    menge:menge,
    status:"Offen"
  });

  save();
  renderBestellungen();
}

function renderBestellungen(){
  const p = baustellen[aktuelleBaustelleIndex].phasen[aktuellePhaseIndex];
  bestellListe.innerHTML = "";

  if(p.bestellungen.length === 0){
    bestellListe.innerHTML = "<p class='small'>Noch keine Bestellung.</p>";
    return;
  }

  p.bestellungen.forEach((b,i)=>{
    bestellListe.innerHTML += `
      <div class="item">
        <strong>${b.art}: ${b.name}</strong><br>
        Menge: ${b.menge}<br>
        Status: ${b.status}
        <button onclick="changeStatus(${i})">Status ändern</button>
        <button class="delete" onclick="deleteBestellung(${i})">Löschen</button>
      </div>
    `;
  });
}

function changeStatus(i){
  const p = baustellen[aktuelleBaustelleIndex].phasen[aktuellePhaseIndex];
  const statusListe = ["Offen","Bestellt","Geliefert"];
  let pos = statusListe.indexOf(p.bestellungen[i].status);
  p.bestellungen[i].status = statusListe[(pos+1) % statusListe.length];
  save();
  renderBestellungen();
}

function deleteBestellung(i){
  const p = baustellen[aktuelleBaustelleIndex].phasen[aktuellePhaseIndex];
  p.bestellungen.splice(i,1);
  save();
  renderBestellungen();
}

function showHome(){
  projekt.classList.add("hidden");
  phasePage.classList.add("hidden");
  home.classList.remove("hidden");
  renderBaustellen();
}

renderBaustellen();
</script>

</body>
</html>
