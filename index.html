<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXBAU Polier App</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
}

header{
  background:#d35400;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:#e67e22;
  color:white;
  font-size:18px;
  font-weight:bold;
}

.item{
  background:#f7f7f7;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

.hidden{
  display:none;
}

.phase{
  border-left:5px solid #e67e22;
}

.back{
  background:#555;
}
</style>
</head>

<body>

<header>
  <h1>🏗️ Polier App</h1>
  <p>georgios</p>
  <p>Baustellen · Phasen · Checklisten</p>
</header>

<div class="container">

  <div id="home">

    <div class="card">

      <h2>➕ Neues Bauvorhaben</h2>

      <input id="ks" placeholder="Kostenstelle">

      <input id="bauName" placeholder="Name des Bauvorhabens">

      <input id="adresse" placeholder="Adresse (optional)">

      <input id="ort" placeholder="Ort (optional)">

      <select id="typ">
        <option>Mehrfamilienhaus</option>
        <option>Einfamilienhaus</option>
        <option>Rohbau</option>
        <option>Umbau</option>
      </select>

      <button onclick="addBaustelle()">
        Bauvorhaben speichern
      </button>

    </div>

    <div class="card">

      <h2>📋 Meine Baustellen</h2>

      <div id="baustellenListe"></div>

    </div>

  </div>

  <div id="projekt" class="hidden">

    <div class="card">

      <h2 id="projektTitel"></h2>

      <div id="projektInfo"></div>

      <h3>🔨 Bauphasen</h3>

      <div id="phasenListe"></div>

      <button class="back" onclick="zurueckHome()">
        Zurück
      </button>

    </div>

  </div>

</div>

<script>

let baustellen = JSON.parse(localStorage.getItem("baustellen")) || [];

const standardPhasen = [
  "Baustelleneinrichtung",
  "Erdarbeiten",
  "Entwässerung / Versorgungsleitung",
  "Gründung",
  "Untergeschoss",
  "Erdgeschoss",
  "1.OG",
  "2.OG",
  "3.OG",
  "4.OG",
  "Dachgeschoss",
  "Abschluss"
];

function saveData(){
  localStorage.setItem("baustellen", JSON.stringify(baustellen));
}

function addBaustelle(){

  const ks = document.getElementById("ks").value.trim();
  const name = document.getElementById("bauName").value.trim();
  const adresse = document.getElementById("adresse").value.trim();
  const ort = document.getElementById("ort").value.trim();
  const typ = document.getElementById("typ").value;

  if(ks === "" || name === ""){
    alert("Bitte Kostenstelle und Name eingeben");
    return;
  }

  const neueBaustelle = {
    kostenstelle: ks,
    name: name,
    adresse: adresse,
    ort: ort,
    typ: typ,
    phasen: standardPhasen
  };

  baustellen.push(neueBaustelle);

  saveData();

  renderBaustellen();

  document.getElementById("ks").value = "";
  document.getElementById("bauName").value = "";
  document.getElementById("adresse").value = "";
  document.getElementById("ort").value = "";

  alert("Bauvorhaben gespeichert");

}

function renderBaustellen(){

  const liste = document.getElementById("baustellenListe");

  liste.innerHTML = "";

  if(baustellen.length === 0){
    liste.innerHTML = "<p>Noch keine Baustelle gespeichert.</p>";
    return;
  }

  baustellen.forEach((b,index)=>{

    liste.innerHTML += `

      <div class="item">

        <strong>${b.name}</strong><br>

        Kostenstelle: ${b.kostenstelle}<br>

        ${b.ort}<br>

        ${b.typ}

        <button onclick="openProjekt(${index})">
  Öffnen
</button>

<button onclick="deleteBaustelle(${index})"
style="background:#c0392b;margin-top:8px;">
  Löschen
</button>

      </div>

    `;
  });

}

function openProjekt(index){

  const b = baustellen[index];

  document.getElementById("home").classList.add("hidden");

  document.getElementById("projekt").classList.remove("hidden");

  document.getElementById("projektTitel").innerHTML =
    "🏗️ " + b.name;

  document.getElementById("projektInfo").innerHTML = `
    <p>
      <strong>Kostenstelle:</strong> ${b.kostenstelle}<br>
      <strong>Adresse:</strong> ${b.adresse}<br>
      <strong>Ort:</strong> ${b.ort}<br>
      <strong>Typ:</strong> ${b.typ}
    </p>
  `;

  let html = "";

  b.phasen.forEach((phase,i)=>{

    html += `

      <div class="item phase">

        <strong>${i+1}. ${phase}</strong>

        <button>
          Phase öffnen
        </button>

      </div>

    `;
  });

  document.getElementById("phasenListe").innerHTML = html;

}
function deleteBaustelle(index){

  if(confirm("Baustelle wirklich löschen?")){

    baustellen.splice(index,1);

    saveData();

    renderBaustellen();

  }

}
function zurueckHome(){

  document.getElementById("projekt").classList.add("hidden");

  document.getElementById("home").classList.remove("hidden");

}

renderBaustellen();

</script>

</body>
</html>
