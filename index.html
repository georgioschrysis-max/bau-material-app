<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polier App</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
header{background:#d35400;color:white;text-align:center;padding:20px}
.container{padding:20px}
.card{background:white;padding:20px;border-radius:15px;margin-bottom:20px}
input,select{width:100%;padding:12px;margin-top:10px;box-sizing:border-box}
button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:10px;background:#e67e22;color:white;font-size:18px;font-weight:bold}
.delete{background:#c0392b}
.back{background:#555}
.item{background:#f7f7f7;padding:12px;border-radius:10px;margin-top:10px}
.hidden{display:none}
.phase{border-left:5px solid #e67e22}
</style>
</head>

<body>

<header>
<h1>🏗️ Polier App</h1>
<p>georgios</p>
<p>Baustellen · Phasen · Checklisten</p>
</header>

<div class="container">

<div id="home">
<div class="card">
<h2>➕ Neues Bauvorhaben</h2>
<input id="ks" placeholder="Kostenstelle">
<input id="bauName" placeholder="Name des Bauvorhabens">
<input id="adresse" placeholder="Adresse">
<input id="ort" placeholder="Ort">
<select id="typ">
<option>Mehrfamilienhaus</option>
<option>Einfamilienhaus</option>
<option>Rohbau</option>
<option>Umbau</option>
</select>
<button onclick="addBaustelle()">Bauvorhaben speichern</button>
</div>

<div class="card">
<h2>📋 Meine Baustellen</h2>
<div id="baustellenListe"></div>
</div>
</div>

<div id="projekt" class="hidden">
<div class="card">
<h2 id="projektTitel"></h2>
<div id="projektInfo"></div>
<h3>🔨 Bauphasen</h3>
<div id="phasenListe"></div>
<button class="back" onclick="zurueckHome()">Zurück</button>
</div>
</div>

<div id="phaseSeite" class="hidden">
<div class="card">
<h2 id="phaseTitel"></h2>
<p id="phaseInfo"></p>

<h3>✅ Checkliste</h3>
<div id="checkliste"></div>
<input id="neuerPunkt" placeholder="Neuen Checkpunkt hinzufügen">
<button onclick="addCheckpunkt()">Checkpunkt hinzufügen</button>

<h3>🚜 Maschinen</h3>
<input id="maschineName" placeholder="Maschine">
<input id="maschineMenge" placeholder="Anzahl / Menge">
<button onclick="addRessource('maschinen','maschineName','maschineMenge')">Maschine hinzufügen</button>
<div id="maschinenListe"></div>

<h3>🛠️ Werkzeuge</h3>
<input id="werkzeugName" placeholder="Werkzeug">
<input id="werkzeugMenge" placeholder="Anzahl / Menge">
<button onclick="addRessource('werkzeuge','werkzeugName','werkzeugMenge')">Werkzeug hinzufügen</button>
<div id="werkzeugeListe"></div>

<h3>📦 Materialien</h3>
<input id="materialName" placeholder="Material">
<input id="materialMenge" placeholder="Menge">
<button onclick="addRessource('materialien','materialName','materialMenge')">Material hinzufügen</button>
<div id="materialienListe"></div>

<h3>👷 Personal</h3>
<input id="personalName" placeholder="Name / Firma">

<select id="personalRolle">
  <option>Polier</option>
  <option>Werkpolier</option>
  <option>Vorarbeiter</option>
  <option>Spezialfacharbeiter</option>
  <option>Facharbeiter</option>
  <option>Bauhelfer</option>
  <option>Azubi</option>
</select>

<input id="personalMenge" placeholder="Anzahl / Aufgabe">

<button onclick="addPersonal()">Personal hinzufügen</button>
<div id="personalListe"></div>
<h3>🛒 Bestellungen</h3>

<input id="bestellungName" placeholder="Artikel / Leistung">
<input id="bestellungMenge" placeholder="Menge">
<input id="bestellungLieferant" placeholder="Lieferant">

<select id="bestellungStatus">
  <option>Offen</option>
  <option>Bestellt</option>
  <option>Geliefert</option>
</select>

<button onclick="addBestellung()">Bestellung hinzufügen</button>

<div id="bestellungenListe"></div>
<h3>📄 Lieferscheine / DA</h3>

<input id="daNummer" placeholder="DA Nummer">
<input id="daDatum" placeholder="Datum">
<input id="daLieferant" placeholder="Lieferant">
<input id="daMaterial" placeholder="Material / Beschreibung">

<select id="daStatus">
  <option>Offen</option>
  <option>Kontrolliert</option>
  <option>Abgelegt</option>
</select>

<button onclick="addDA()">
  DA hinzufügen
</button>

<div id="daListe"></div>
<button class="back" onclick="zurueckProjekt()">Zurück zu den Phasen</button>
</div>
</div>

</div>

<script>
let baustellen = JSON.parse(localStorage.getItem("baustellen")) || [];
let aktuelleBaustelle = null;
let aktuellePhase = null;

const standardPhasen = [
"Baustelleneinrichtung",
"Erdarbeiten",
"Entwässerung / Versorgungsleitung",
"Gründung",
"Untergeschoss",
"Erdgeschoss",
"1.OG",
"2.OG",
"3.OG",
"4.OG",
"Dachgeschoss",
"Abschluss"
];

const standardChecklist = [
"Pläne geprüft",
"Materialbedarf geprüft",
"Werkzeuge geprüft",
"Sicherheit kontrolliert",
"Termin abgestimmt",
"Arbeit abgeschlossen"
];

function saveData(){
localStorage.setItem("baustellen", JSON.stringify(baustellen));
}

function addBaustelle(){
const ks=ksInput();
const name=document.getElementById("bauName").value.trim();
const adresse=document.getElementById("adresse").value.trim();
const ort=document.getElementById("ort").value.trim();
const typ=document.getElementById("typ").value;

if(!ks || !name){
alert("Bitte Kostenstelle und Name eingeben");
return;
}

const phasen = standardPhasen.map(p => ({
name:p,
checkliste: standardChecklist.map(c => ({text:c, done:false})),
maschinen:[],
werkzeuge:[],
materialien:[],
personal:[],
bestellungen:[],
lieferscheine:[]
}));

baustellen.push({kostenstelle:ks,name,adresse,ort,typ,phasen});
saveData();
renderBaustellen();

document.getElementById("ks").value="";
document.getElementById("bauName").value="";
document.getElementById("adresse").value="";
document.getElementById("ort").value="";
}

function ksInput(){
return document.getElementById("ks").value.trim();
}

function renderBaustellen(){
const liste=document.getElementById("baustellenListe");
liste.innerHTML="";

if(baustellen.length===0){
liste.innerHTML="<p>Noch keine Baustelle gespeichert.</p>";
return;
}

baustellen.forEach((b,index)=>{
liste.innerHTML+=`
<div class="item">
<strong>${b.name}</strong><br>
Kostenstelle: ${b.kostenstelle}<br>
${b.ort}<br>
${b.typ}
<button onclick="openProjekt(${index})">Öffnen</button>
<button class="delete" onclick="deleteBaustelle(${index})">Löschen</button>
</div>`;
});
}

function deleteBaustelle(index){
if(confirm("Baustelle wirklich löschen?")){
baustellen.splice(index,1);
saveData();
renderBaustellen();
}
}

function openProjekt(index){
aktuelleBaustelle=index;
const b=baustellen[index];

document.getElementById("home").classList.add("hidden");
document.getElementById("phaseSeite").classList.add("hidden");
document.getElementById("projekt").classList.remove("hidden");

document.getElementById("projektTitel").innerHTML="🏗️ "+b.name;
document.getElementById("projektInfo").innerHTML=`
<strong>Kostenstelle:</strong> ${b.kostenstelle}<br>
<strong>Adresse:</strong> ${b.adresse}<br>
<strong>Ort:</strong> ${b.ort}<br>
<strong>Typ:</strong> ${b.typ}
`;

renderPhasen();
}

function renderPhasen(){
const b=baustellen[aktuelleBaustelle];
const liste=document.getElementById("phasenListe");
liste.innerHTML="";

b.phasen.forEach((p,index)=>{
const erledigt=p.checkliste.filter(c=>c.done).length;
const ressourcen =
p.maschinen.length +
p.werkzeuge.length +
p.materialien.length +
p.personal.length;

liste.innerHTML+=`
<div class="item phase">
<strong>${index+1}. ${p.name}</strong><br>
Checkliste: ${erledigt}/${p.checkliste.length} erledigt<br>
Einträge: ${ressourcen}
<button onclick="openPhase(${index})">Phase öffnen</button>
</div>`;
});
}

function openPhase(index){
aktuellePhase=index;

const b=baustellen[aktuelleBaustelle];
const p=b.phasen[index];

document.getElementById("projekt").classList.add("hidden");
document.getElementById("phaseSeite").classList.remove("hidden");

document.getElementById("phaseTitel").innerHTML="🔨 "+p.name;
document.getElementById("phaseInfo").innerHTML="Kostenstelle: "+b.kostenstelle+" · "+b.name;

renderCheckliste();
renderRessourcen();
renderBestellungen();
}

function renderCheckliste(){
const p=baustellen[aktuelleBaustelle].phasen[aktuellePhase];
const box=document.getElementById("checkliste");
box.innerHTML="";

p.checkliste.forEach((c,index)=>{
box.innerHTML+=`
<label class="item" style="display:block">
<input type="checkbox" ${c.done ? "checked" : ""} onchange="toggleCheck(${index})">
${c.text}
</label>`;
});
}

function toggleCheck(index){
const p=baustellen[aktuelleBaustelle].phasen[aktuellePhase];
p.checkliste[index].done=!p.checkliste[index].done;
saveData();
renderCheckliste();
}

function addCheckpunkt(){
const text=document.getElementById("neuerPunkt").value.trim();

if(!text){
alert("Bitte Checkpunkt eingeben");
return;
}

const p=baustellen[aktuelleBaustelle].phasen[aktuellePhase];
p.checkliste.push({text:text,done:false});
saveData();
renderCheckliste();

document.getElementById("neuerPunkt").value="";
}

function addRessource(kategorie,nameId,mengeId){
const name=document.getElementById(nameId).value.trim();
const menge=document.getElementById(mengeId).value.trim();

if(!name || !menge){
alert("Bitte Name und Menge eingeben");
return;
}

const p=baustellen[aktuelleBaustelle].phasen[aktuellePhase];
p[kategorie].push({name:name, menge:menge});

saveData();
renderRessourcen();

document.getElementById(nameId).value="";
document.getElementById(mengeId).value="";
}
function addPersonal(){
  const name = document.getElementById("personalName").value.trim();
  const rolle = document.getElementById("personalRolle").value;
  const menge = document.getElementById("personalMenge").value.trim();

  if(!name || !menge){
    alert("Bitte Name/Firma und Anzahl/Aufgabe eingeben");
    return;
  }

  const p = baustellen[aktuelleBaustelle].phasen[aktuellePhase];

  p.personal.push({
    name: name + " - " + rolle,
    menge: menge
  });

  saveData();
  renderRessourcen();

  document.getElementById("personalName").value = "";
  document.getElementById("personalMenge").value = "";
}
function deleteRessource(kategorie,index){
const p=baustellen[aktuelleBaustelle].phasen[aktuellePhase];
p[kategorie].splice(index,1);
saveData();
renderRessourcen();
}
function addBestellung(){
  const name = document.getElementById("bestellungName").value.trim();
  const menge = document.getElementById("bestellungMenge").value.trim();
  const lieferant = document.getElementById("bestellungLieferant").value.trim();
  const status = document.getElementById("bestellungStatus").value;

  if(!name || !menge || !lieferant){
    alert("Bitte alle Felder ausfüllen");
    return;
  }

  const p = baustellen[aktuelleBaustelle].phasen[aktuellePhase];

  p.bestellungen.push({
    name:name,
    menge:menge,
    lieferant:lieferant,
    status:status
  });

  saveData();
  renderBestellungen();

  document.getElementById("bestellungName").value = "";
  document.getElementById("bestellungMenge").value = "";
  document.getElementById("bestellungLieferant").value = "";
  document.getElementById("bestellungStatus").value = "Offen";
}

function deleteBestellung(index){
  const p = baustellen[aktuelleBaustelle].phasen[aktuellePhase];
  p.bestellungen.splice(index,1);
  saveData();
  renderBestellungen();
}

function renderBestellungen(){
  const p = baustellen[aktuelleBaustelle].phasen[aktuellePhase];
  const box = document.getElementById("bestellungenListe");

  box.innerHTML = "";

  if(!p.bestellungen){
    p.bestellungen = [];
  }

  if(p.bestellungen.length === 0){
    box.innerHTML = "<p>Noch keine Bestellungen.</p>";
    return;
  }

  p.bestellungen.forEach((b,index)=>{
    box.innerHTML += `
      <div class="item">
        <strong>${b.name}</strong><br>
        Menge: ${b.menge}<br>
        Lieferant: ${b.lieferant}<br>
        Status: ${b.status}
        <button class="delete" onclick="deleteBestellung(${index})">Löschen</button>
      </div>
    `;
  });
}
function addDA(){

  const nummer =
    document.getElementById("daNummer").value.trim();

  const datum =
    document.getElementById("daDatum").value.trim();

  const lieferant =
    document.getElementById("daLieferant").value.trim();

  const material =
    document.getElementById("daMaterial").value.trim();

  const status =
    document.getElementById("daStatus").value;

  if(!nummer || !datum || !lieferant || !material){

    alert("Bitte alle DA Felder ausfüllen");

    return;

  }

  const p =
    baustellen[aktuelleBaustelle].phasen[aktuellePhase];

  p.lieferscheine.push({
    nummer:nummer,
    datum:datum,
    lieferant:lieferant,
    material:material,
    status:status
  });

  saveData();

  renderDA();

  document.getElementById("daNummer").value="";
  document.getElementById("daDatum").value="";
  document.getElementById("daLieferant").value="";
  document.getElementById("daMaterial").value="";
}

function deleteDA(index){

  const p =
    baustellen[aktuelleBaustelle].phasen[aktuellePhase];

  p.lieferscheine.splice(index,1);

  saveData();

  renderDA();
}

function renderDA(){

  const p =
    baustellen[aktuelleBaustelle].phasen[aktuellePhase];

  const box =
    document.getElementById("daListe");

  box.innerHTML = "";

  if(!p.lieferscheine){
    p.lieferscheine = [];
  }

  if(p.lieferscheine.length === 0){

    box.innerHTML =
      "<p>Noch keine Lieferscheine.</p>";

    return;
  }

  p.lieferscheine.forEach((d,index)=>{

    box.innerHTML += `

      <div class="item">

        <strong>DA: ${d.nummer}</strong><br>

        Datum: ${d.datum}<br>

        Lieferant: ${d.lieferant}<br>

        Material: ${d.material}<br>

        Status: ${d.status}

        <button class="delete"
        onclick="deleteDA(${index})">
          Löschen
        </button>

      </div>

    `;
  });

}
function renderRessourcen(){
const p=baustellen[aktuelleBaustelle].phasen[aktuellePhase];

renderListe("maschinenListe",p.maschinen,"maschinen");
renderListe("werkzeugeListe",p.werkzeuge,"werkzeuge");
renderListe("materialienListe",p.materialien,"materialien");
renderListe("personalListe",p.personal,"personal");
}

function renderListe(elementId,liste,kategorie){
const box=document.getElementById(elementId);
box.innerHTML="";

if(liste.length===0){
box.innerHTML="<p>Noch keine Einträge.</p>";
return;
}

liste.forEach((x,index)=>{
box.innerHTML+=`
<div class="item">
<strong>${x.name}</strong><br>
Menge / Info: ${x.menge}
<button class="delete" onclick="deleteRessource('${kategorie}',${index})">Löschen</button>
</div>`;
});
}

function zurueckProjekt(){
document.getElementById("phaseSeite").classList.add("hidden");
document.getElementById("projekt").classList.remove("hidden");
renderPhasen();
}

function zurueckHome(){
document.getElementById("projekt").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
renderBaustellen();
}

renderBaustellen();
</script>

</body>
</html>
