<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bau Material App</title>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; }
header { background:#d35400; color:white; padding:25px; text-align:center; }
.container { padding:20px; }
.card, .page {
  background:white; padding:20px; margin-bottom:15px;
  border-radius:14px; box-shadow:0 3px 8px rgba(0,0,0,0.15);
}
input {
  width:100%; padding:14px; margin-top:10px; box-sizing:border-box;
  border:1px solid #ccc; border-radius:8px; font-size:16px;
}
button {
  width:100%; padding:15px; border:none; border-radius:10px;
  background:#e67e22; color:white; font-size:18px; font-weight:bold; margin-top:10px;
}
.back { background:#555; }
.delete { background:#c0392b; font-size:14px; padding:10px; }
.hidden { display:none; }
.item { background:#f1f1f1; padding:12px; margin-top:10px; border-radius:8px; }
</style>
</head>

<body>

<header>
  <h1>🏗️ Bau Material App</h1>
  <p>Willkommen Georgios</p>
</header>

<div class="container">

  <div id="home">
    <div class="card">
      <h2>📦 Lagerbestand</h2>
      <button onclick="showPage('lager')">Öffnen</button>
    </div>

    <div class="card">
      <h2>📄 Lieferscheine</h2>
      <button onclick="showPage('lieferscheine')">Öffnen</button>
    </div>

    <div class="card">
      <h2>🏗️ Baustellen</h2>
      <button onclick="showPage('baustellen')">Öffnen</button>
    </div>
  </div>

  <div id="lager" class="page hidden">
    <h2>📦 Lagerbestand</h2>

    <input id="materialName" placeholder="Materialname">
    <input id="materialMenge" placeholder="Menge">
    <input id="materialBaustelle" placeholder="Baustelle">

    <button onclick="addMaterial()">Material hinzufügen</button>

    <h3>Gespeicherte Materialien</h3>
    <div id="materialListe"></div>

    <button class="back" onclick="showPage('home')">Zurück</button>
  </div>

  <div id="lieferscheine" class="page hidden">
    <h2>📄 Lieferscheine / DA</h2>

    <input id="daNummer" placeholder="DA-Nummer">
    <input id="daDatum" placeholder="Datum z.B. 18.05.2026">
    <input id="daLieferant" placeholder="Lieferant">
    <input id="daMaterial" placeholder="Material / Beschreibung">

    <button onclick="addDA()">Lieferschein hinzufügen</button>

    <h3>Gespeicherte Lieferscheine</h3>
    <div id="daListe"></div>

    <button class="back" onclick="showPage('home')">Zurück</button>
  </div>

  <div id="baustellen" class="page hidden">
    <h2>🏗️ Baustellen</h2>

    <input id="baustelleName" placeholder="Name der Baustelle">
    <input id="baustelleOrt" placeholder="Ort">
    <input id="baustelleAdresse" placeholder="Adresse">
    <input id="baustelleLeiter" placeholder="Bauleiter / Verantwortlicher">

    <button onclick="addBaustelle()">Baustelle hinzufügen</button>

    <h3>Gespeicherte Baustellen</h3>
    <div id="baustellenListe"></div>

    <button class="back" onclick="showPage('home')">Zurück</button>
  </div>

</div>

<script>
let materialien = JSON.parse(localStorage.getItem("materialien")) || [];
let lieferscheine = JSON.parse(localStorage.getItem("lieferscheine")) || [];
let baustellen = JSON.parse(localStorage.getItem("baustellen")) || [];

function showPage(pageId) {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('lager').classList.add('hidden');
  document.getElementById('lieferscheine').classList.add('hidden');
  document.getElementById('baustellen').classList.add('hidden');
  document.getElementById(pageId).classList.remove('hidden');
}

function saveAll() {
  localStorage.setItem("materialien", JSON.stringify(materialien));
  localStorage.setItem("lieferscheine", JSON.stringify(lieferscheine));
  localStorage.setItem("baustellen", JSON.stringify(baustellen));
}

function addMaterial() {
  const name = materialName.value;
  const menge = materialMenge.value;
  const baustelle = materialBaustelle.value;

  if (!name || !menge || !baustelle) {
    alert("Bitte alle Felder ausfüllen");
    return;
  }

  materialien.push({ name, menge, baustelle });
  saveAll();
  renderAll();

  materialName.value = "";
  materialMenge.value = "";
  materialBaustelle.value = "";
}

function addDA() {
  const nummer = daNummer.value;
  const datum = daDatum.value;
  const lieferant = daLieferant.value;
  const material = daMaterial.value;

  if (!nummer || !datum || !lieferant || !material) {
    alert("Bitte alle Felder ausfüllen");
    return;
  }

  lieferscheine.push({ nummer, datum, lieferant, material });
  saveAll();
  renderAll();

  daNummer.value = "";
  daDatum.value = "";
  daLieferant.value = "";
  daMaterial.value = "";
}

function addBaustelle() {
  const name = baustelleName.value;
  const ort = baustelleOrt.value;
  const adresse = baustelleAdresse.value;
  const leiter = baustelleLeiter.value;

  if (!name || !ort || !adresse || !leiter) {
    alert("Bitte alle Felder ausfüllen");
    return;
  }

  baustellen.push({ name, ort, adresse, leiter });
  saveAll();
  renderAll();

  baustelleName.value = "";
  baustelleOrt.value = "";
  baustelleAdresse.value = "";
  baustelleLeiter.value = "";
}

function deleteMaterial(index) {
  materialien.splice(index, 1);
  saveAll();
  renderAll();
}

function deleteDA(index) {
  lieferscheine.splice(index, 1);
  saveAll();
  renderAll();
}

function deleteBaustelle(index) {
  baustellen.splice(index, 1);
  saveAll();
  renderAll();
}

function renderAll() {
  materialListe.innerHTML = "";
  materialien.forEach((m, i) => {
    materialListe.innerHTML += `
      <div class="item">
        <strong>${m.name}</strong><br>
        Menge: ${m.menge}<br>
        Baustelle: ${m.baustelle}
        <button class="delete" onclick="deleteMaterial(${i})">Löschen</button>
      </div>`;
  });

  daListe.innerHTML = "";
  lieferscheine.forEach((d, i) => {
    daListe.innerHTML += `
      <div class="item">
        <strong>${d.nummer}</strong><br>
        Datum: ${d.datum}<br>
        Lieferant: ${d.lieferant}<br>
        Material: ${d.material}
        <button class="delete" onclick="deleteDA(${i})">Löschen</button>
      </div>`;
  });

  baustellenListe.innerHTML = "";
  baustellen.forEach((b, i) => {
    baustellenListe.innerHTML += `
      <div class="item">
        <strong>${b.name}</strong><br>
        Ort: ${b.ort}<br>
        Adresse: ${b.adresse}<br>
        Verantwortlicher: ${b.leiter}
        <button class="delete" onclick="deleteBaustelle(${i})">Löschen</button>
      </div>`;
  });
}

renderAll();
</script>

</body>
</html>
