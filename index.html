<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bau Material App</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 0;
}

header {
  background: #d35400;
  color: white;
  padding: 25px;
  text-align: center;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #e67e22;
  color: white;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>🏗️ Bau Material App</h1>
  <p>Willkommen Georgios</p>
</header>

<div class="container">

  <div class="card">
    <h2>Lagerbestand</h2>
    <p>Materialien verwalten und kontrollieren.</p>
    <button onclick="alert('Lagerbestand geöffnet')">Öffnen</button>
  </div>

  <div class="card">
    <h2>Lieferscheine</h2>
    <p>DA-Nummern und Lieferungen erfassen.</p>
    <button onclick="alert('Lieferscheine geöffnet')">Öffnen</button>
  </div>

  <div class="card">
    <h2>Baustellen</h2>
    <p>Projekte und Baustellen organisieren.</p>
    <button onclick="alert('Baustellen geöffnet')">Öffnen</button>
  </div>

</div>

</body>
</html>
